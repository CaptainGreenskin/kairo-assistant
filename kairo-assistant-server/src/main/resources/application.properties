server.port=${KAIRO_SERVER_PORT:8080}
spring.application.name=kairo-assistant

# Evolution + curator (Hermes-parity skill governance) — see kairo-spring-boot-starter-evolution
# Default OFF; toggle on via env to seed the curator daemon and REST surface.
kairo.evolution.enabled=${KAIRO_EVOLUTION_ENABLED:false}
kairo.evolution.curator.enabled=${KAIRO_EVOLUTION_CURATOR_ENABLED:false}
kairo.evolution.curator.auto-start=${KAIRO_EVOLUTION_CURATOR_AUTOSTART:false}
